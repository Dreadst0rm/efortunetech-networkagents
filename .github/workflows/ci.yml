name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        go-version: ['1.21', '1.22', '1.23']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test -v -cover ./...

      - name: Build
        run: go build -o networksentinel .

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build Windows
        run: go build -o networksentinel_windows.exe -tags netgo .
        env:
          GOOS: windows
          GOARCH: amd64

      - name: Build Linux
        run: go build -o networksentinel_linux -tags netgo .
        env:
          GOOS: linux
          GOARCH: amd64

      - name: Build macOS
        run: go build -o networksentinel_darwin -tags netgo .
        env:
          GOOS: darwin
          GOARCH: amd64

  golangci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
